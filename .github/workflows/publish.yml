name: Publish

on:
  release:
    types: [ released, prereleased ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0). Leave empty to auto-increment minor version.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  publish:
    name: Release build and publish
    runs-on: macos-latest
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.version }}" ]; then
            echo "version=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(gh release list --limit 1 --json tagName -q '.[0].tagName // empty' 2>/dev/null || true)
            if [ -z "$LATEST" ]; then
              echo "version=v0.1.0" >> "$GITHUB_OUTPUT"
            else
              LATEST="${LATEST#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
              MINOR=$((MINOR + 1))
              echo "version=v${MAJOR}.${MINOR}.0" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create release (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: |
          ./gradlew :cacheonhand:jvmTest
          ./gradlew :cacheonhand-attendants:jvmTest
          ./gradlew :cacheonhand-compose:jvmTest

      - name: Publish cacheonhand
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: ./gradlew :cacheonhand:publishAndReleaseToMavenCentral --no-configuration-cache

      - name: Publish cacheonhand-attendants
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: ./gradlew :cacheonhand-attendants:publishAndReleaseToMavenCentral --no-configuration-cache

      - name: Publish cacheonhand-compose
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: ./gradlew :cacheonhand-compose:publishAndReleaseToMavenCentral --no-configuration-cache
